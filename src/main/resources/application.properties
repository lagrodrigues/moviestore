quarkus.http.port=8080

quarkus.datasource.db-kind=${QUARKUS_DATASOURCE_DB_KIND:postgresql}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:movie_user}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:movie_pass}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/movie_store}

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true

quarkus.flyway.migrate-at-start=${QUARKUS_FLYWAY_MIGRATE_AT_START:true}
quarkus.flyway.locations=db/migration

quarkus.swagger-ui.always-include=true

movie-api/mp-rest/url=https://imdb.iamidiotareyoutoo.com
movie-api/mp-rest/scope=jakarta.inject.Singleton

quarkus.rest-client.movie-api.url=https://imdb.iamidiotareyoutoo.com
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=2000

