services:
  postgres:
    image: postgres:16
    container_name: moviestore-postgres
    environment:
      POSTGRES_DB: movie_store
      POSTGRES_USER: movie_store
      POSTGRES_PASSWORD: movie_store
    ports:
      - "5432:5432"
    volumes:
      - moviestore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U movie_store -d movie_store" ]
      interval: 5s
      timeout: 5s
      retries: 10

  moviestore-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moviestore-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: movie_store
      QUARKUS_DATASOURCE_PASSWORD: movie_store
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/movie_store
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
      QUARKUS_HTTP_HOST: 0.0.0.0
    ports:
      - "8080:8080"

volumes:
  moviestore_postgres_data: